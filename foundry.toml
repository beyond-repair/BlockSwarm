[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
remappings = [
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

# Optimization
optimizer = true
optimizer_runs = 200

# Fuzzing & Invariant Settings
fuzz = { runs = 10_000 }
invariant = { runs = 256, depth = 128, fail_on_revert = true }

# Test Configuration
fs_permissions = [
    { access = "read-write", path = "./" }
]

# Gas & Coverage
gas_reports = ["*"]
gas_reports_ignore = ["console"]

# RPC for fork testing (optional)
[rpc_endpoints]
sepolia = "${RPC_URL}"

# Required for formal invariant verification
[profile.invariant]
fuzz = { runs = 50_000 }
invariant = { runs = 512, depth = 256 }

# Contracts to target for invariant testing
[profile.invariant.fuzz]
seed = 42
